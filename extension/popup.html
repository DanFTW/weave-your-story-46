<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weave LinkedIn Auto-Capture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      width: 320px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }
    
    .container {
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .subtitle {
      font-size: 12px;
      color: #8892b0;
    }
    
    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    
    .status-row:last-child {
      margin-bottom: 0;
    }
    
    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    
    .status-indicator.active {
      background: #10b981;
      box-shadow: 0 0 10px #10b981;
    }
    
    .status-indicator.inactive {
      background: #ef4444;
      box-shadow: 0 0 10px #ef4444;
    }
    
    .status-indicator.pending {
      background: #f59e0b;
      box-shadow: 0 0 10px #f59e0b;
    }
    
    .status-label {
      font-size: 14px;
      color: #e2e8f0;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
    }
    
    .stat-label {
      font-size: 11px;
      color: #8892b0;
      margin-top: 4px;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      margin-top: 8px;
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .info-text {
      font-size: 12px;
      color: #8892b0;
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🧵</div>
      <div>
        <div class="title">Weave Auto-Capture</div>
        <div class="subtitle">LinkedIn Connections</div>
      </div>
    </div>
    
    <div class="status-card">
      <div class="status-row">
        <div id="authIndicator" class="status-indicator inactive"></div>
        <span id="authStatus" class="status-label">Not Connected</span>
      </div>
      <div class="status-row">
        <div id="captureIndicator" class="status-indicator inactive"></div>
        <span id="captureStatus" class="status-label">Capture Inactive</span>
      </div>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div id="eventsSent" class="stat-value">0</div>
        <div class="stat-label">Contacts Captured</div>
      </div>
      <div class="stat-card">
        <div id="queueLength" class="stat-value">0</div>
        <div class="stat-label">In Queue</div>
      </div>
    </div>
    
    <div id="notConnectedView">
      <button id="loginBtn" class="btn btn-primary">
        Connect to Weave
      </button>
      <p class="info-text">
        Log in to Weave to start capturing your LinkedIn connections automatically.
      </p>
    </div>
    
    <div id="connectedView" class="hidden">
      <button id="openWeaveBtn" class="btn btn-primary">
        Open Weave Dashboard
      </button>
      <button id="logoutBtn" class="btn btn-secondary">
        Disconnect
      </button>
      <p id="lastEventText" class="info-text"></p>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
